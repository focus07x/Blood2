<script type="module">
  // ────────────────────────────────────────────────
  //   แก้ 2 บรรทัดนี้ด้วยค่าจริงจาก Supabase ของคุณ
  // ────────────────────────────────────────────────
  const SUPABASE_URL    = 'https://znytnnxjmfrxbgbveyzg.supabase.co';
  const SUPABASE_ANON   = 'sb_publishable_hz3MaJmvdWcWvOAncWJREQ_ZkUfuHti';

  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON);

  const listEl   = document.getElementById('list');
  const input    = document.getElementById('input');
  const addBtn   = document.getElementById('add');

  let items = [];           // array ตัวหลัก (จะ sync กับ db)

  // ── Helper ───────────────────────────────────────
  function isProbablyUrl(str) {
    return /^(https?:\/\/|www\.)[^\s/\( .?#].[^\s]* \)/i.test(str) ||
           (str.includes('.') && !str.includes(' ') && str.length > 8);
  }

  function render() {
    listEl.innerHTML = '';

    if (items.length === 0) {
      listEl.innerHTML = '<div class="empty">ยังไม่มีลิงก์</div>';
      return;
    }

    // เรียงตาม created_at ล่าสุดก่อน (หรือ id ถ้าไม่มี created_at)
    items.sort((a,b) => new Date(b.created_at) - new Date(a.created_at));

    items.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'item';

      const number = document.createElement('span');
      number.className = 'number';
      number.textContent = (items.length - index) + '  ';

      const textSpan = document.createElement('span');
      textSpan.className = 'text';
      textSpan.textContent = item.text;

      const status = document.createElement('span');
      status.className = 'status';
      status.textContent = 'คัดลอกแล้ว!';

      div.append(number, textSpan, status);

      // คลิกเดียว → copy → ลบออกจาก db
      div.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(item.text);
          div.classList.add('copied');

          // ลบจาก Supabase
          await supabase.from('blood_links').delete().eq('id', item.id);

          // ไม่ต้อง render เอง เพราะ realtime จะมาจัดการ
        } catch (err) {
          console.error('Copy ล้มเหลว', err);
          alert('คัดลอกไม่ได้ กรุณาลองใหม่');
        }
      });

      // Double click → เปิดลิงก์ (ถ้าเป็น URL)
      div.addEventListener('dblclick', () => {
        if (isProbablyUrl(item.text)) {
          window.open(item.text, '_blank', 'noopener,noreferrer');
        }
      });

      listEl.appendChild(div);
    });
  }

  // ── Load ข้อมูลครั้งแรก + Realtime ───────────────────────────────
  async function loadInitial() {
    const { data, error } = await supabase
      .from('blood_links')
      .select('*')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('โหลดไม่ได้', error);
      listEl.innerHTML = '<div class="empty">เกิดข้อผิดพลาดในการโหลดข้อมูล</div>';
      return;
    }

    items = data || [];
    render();
  }

  // Realtime subscription
  supabase
    .channel('blood_links_changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'blood_links' }, (payload) => {
      if (payload.eventType === 'INSERT') {
        items.unshift(payload.new);   // ใส่ตัวใหม่ด้านบน
      } else if (payload.eventType === 'DELETE') {
        items = items.filter(i => i.id !== payload.old.id);
      }
      // UPDATE ไม่ค่อยใช้ในกรณีนี้ แต่ถ้ามีก็จัดการได้
      render();
    })
    .subscribe();

  // ── เพิ่มลิงก์ ────────────────────────────────────────
  async function addItem() {
    const val = input.value.trim();
    if (!val) return;

    const { data, error } = await supabase
      .from('blood_links')
      .insert({ text: val })
      .select()
      .single();

    if (error) {
      console.error('เพิ่มไม่ได้', error);
      alert('เพิ่มลิงก์ไม่ได้ กรุณาลองใหม่');
      return;
    }

    // ไม่ต้อง push เอง เพราะ realtime จะ push มาให้
    input.value = '';
  }

  // Event listeners
  addBtn.addEventListener('click', addItem);
  input.addEventListener('keypress', e => {
    if (e.key === 'Enter') addItem();
  });

  // เริ่มทำงาน
  loadInitial();
</script>
