<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blood strike</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      color: #333;
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      margin-bottom: 10px;
    }
    .container {
      max-width: 600px;
      margin: 0 auto;
    }
    .input-area {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }
    input[type="text"] {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      border: 1px solid #ccc;
      border-radius: 8px;
      outline: none;
    }
    input[type="text"]:focus {
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
    }
    button#add {
      padding: 0 20px;
      font-size: 16px;
      background: #2ecc71;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button#add:hover {
      background: #27ae60;
    }
    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .item {
      background: white;
      padding: 14px 16px;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.25s;
      cursor: pointer;
      user-select: none;
    }
    .item.copied {
      background: #e8f5e9;
      border-left: 5px solid #27ae60;
      transform: scale(1.02);
    }
    .number {
      font-weight: bold;
      color: #e74c3c;
      min-width: 35px;
      text-align: right;
      margin-right: 12px;
      font-size: 1.1em;
    }
    .text {
      flex: 1;
      word-break: break-all;
    }
    .status {
      font-size: 0.9em;
      color: #27ae60;
      font-weight: 600;
      min-width: 110px;
      text-align: right;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .item.copied .status {
      opacity: 1;
    }
    .empty {
      text-align: center;
      color: #777;
      padding: 60px 0;
      font-style: italic;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>ลิ้งค์ไก่Blood</h1>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="วางลิงก์ หรือพิมพ์ข้อความ..." autocomplete="off"/>
    <button id="add">เพิ่ม</button>
  </div>

  <div class="list" id="list"></div>
</div>

<!-- โหลด Supabase จาก CDN (ง่ายที่สุด ไม่ต้อง npm) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  // แก้ 2 บรรทัดนี้ด้วยข้อมูลจริงของคุณ
  const SUPABASE_URL    = 'https://znytnnxjmfrxbgbveyzg.supabase.co';
  const SUPABASE_ANON_KEY = 'sb_publishable_hz3MaJmvdWcWvOAncWJREQ_ZkUfuHti';

  const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const list = document.getElementById('list');
  const input = document.getElementById('input');
  const addBtn = document.getElementById('add');

  let items = [];           // เก็บข้อมูลใน memory
  let currentUserId = null; // ใช้แยก device ถ้าต้องการ (optional)

  // ฟังก์ชันช่วยแปลง timestamp → วันที่สั้นๆ (ถ้าต้องการแสดงเวลา)
  function formatDate(dateStr) {
    if (!dateStr) return '';
    const d = new Date(dateStr);
    return d.toLocaleString('th-TH', { dateStyle: 'short', timeStyle: 'short' });
  }

  async function loadAndRender() {
    const { data, error } = await supabase
      .from('quick_links')
      .select('*')
      .order('created_at', { ascending: false }) // ใหม่ → เก่า
      .limit(50); // ป้องกันโหลดเยอะเกิน

    if (error) {
      console.error('โหลดไม่ได้', error);
      list.innerHTML = '<div class="empty">โหลดข้อมูลไม่ได้ กรุณารีเฟรช</div>';
      return;
    }

    items = data || [];
    render();
  }

  function render() {
    list.innerHTML = '';
    if (items.length === 0) {
      list.innerHTML = '<div class="empty">ยังไม่มีข้อความ</div>';
      return;
    }

    items.forEach((item, index) => {
      const div = document.createElement('div');
      div.className = 'item';
      if (item.copied) div.classList.add('copied');

      const number = document.createElement('span');
      number.className = 'number';
      number.textContent = (index + 1) + '  ';

      const textSpan = document.createElement('span');
      textSpan.className = 'text';
      textSpan.textContent = item.text;

      const status = document.createElement('span');
      status.className = 'status';
      status.textContent = 'คัดลอกแล้ว!';

      div.appendChild(number);
      div.appendChild(textSpan);
      div.appendChild(status);

      // คลิกเดียว → คัดลอก + อัพเดท copied = true แล้วลบ (เหมือนเดิม)
      div.addEventListener('click', async () => {
        if (e.detail === 2) return;

        try {
          await navigator.clipboard.writeText(item.text);
          div.classList.add('copied');

          // อัพเดทในฐานข้อมูล
          await supabase
            .from('quick_links')
            .update({ copied: true })
            .eq('id', item.id);

          // ลบหลังจาก 800ms (เหมือนเดิม)
          setTimeout(async () => {
            await supabase.from('quick_links').delete().eq('id', item.id);
            // ไม่ต้อง render เอง เพราะ realtime จะทำ
          }, 800);

        } catch (err) {
          console.error('คัดลอกไม่ได้:', err);
          alert('คัดลอกไม่ได้ กรุณาลองใหม่');
        }
      });

      // Double click → เปิดลิงก์ (ถ้าเป็น URL)
      div.addEventListener('dblclick', () => {
        if (isProbablyUrl(item.text)) {
          window.open(item.text, '_blank', 'noopener,noreferrer');
        }
      });

      list.appendChild(div);
    });
  }

  function isProbablyUrl(str) {
    return /^(https?:\/\/|www\.)[^\s/\( .?#].[^\s]* \)/i.test(str) ||
           (str.includes('.') && !str.includes(' ') && str.length > 8);
  }

  async function addItem() {
    const val = input.value.trim();
    if (!val) return;

    const { error } = await supabase
      .from('quick_links')
      .insert({ text: val, copied: false });

    if (error) {
      console.error('เพิ่มไม่ได้', error);
      alert('เพิ่มไม่ได้ กรุณาลองใหม่');
      return;
    }

    input.value = '';
    // ไม่ต้อง render เอง → realtime จะ push เข้ามา
  }

  // เริ่มต้น
  (async () => {
    // เข้าสู่ระบบแบบ anonymous (ถ้ายังไม่มี session)
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) {
      const { error } = await supabase.auth.signInAnonymously();
      if (error) console.error('Anonymous login ล้มเหลว', error);
    }

    await loadAndRender();

    // Realtime subscription
    const channel = supabase.channel('quick_links_changes');

    channel
      .on('postgres_changes', { event: '*', schema: 'public', table: 'quick_links' }, (payload) => {
        // มีการเปลี่ยนแปลง → โหลดใหม่ทั้งหมด (ง่ายสุด)
        loadAndRender();
      })
      .subscribe();

    // Cleanup เมื่อปิดหน้า
    window.addEventListener('beforeunload', () => {
      supabase.removeChannel(channel);
    });
  })();

  addBtn.addEventListener('click', addItem);
  input.addEventListener('keypress', e => {
    if (e.key === 'Enter') addItem();
  });
</script>

</body>
</html>
