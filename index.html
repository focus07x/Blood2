<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blood strike - ลิ้งค์ไก่ Real-time</title>
  <!-- เพิ่ม supabase-js จาก CDN (ง่ายสุด ไม่ต้อง build) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* คงสไตล์เดิมทั้งหมดของคุณไว้เลย */
    body { font-family: system-ui, -apple-system, sans-serif; background: #f0f2f5; margin: 0; padding: 20px; color: #333; }
    h1 { text-align: center; color: #2c3e50; margin-bottom: 10px; }
    .container { max-width: 600px; margin: 0 auto; }
    .input-area { display: flex; gap: 8px; margin-bottom: 24px; }
    input[type="text"] { flex: 1; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 8px; outline: none; }
    input[type="text"]:focus { border-color: #3498db; box-shadow: 0 0 0 3px rgba(52,152,219,0.2); }
    button#add { padding: 0 20px; font-size: 16px; background: #2ecc71; color: white; border: none; border-radius: 8px; cursor: pointer; }
    button#add:hover { background: #27ae60; }
    .list { display: flex; flex-direction: column; gap: 10px; }
    .item { background: white; padding: 14px 16px; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; transition: all 0.25s; cursor: pointer; user-select: none; }
    .item.copied { background: #e8f5e9; border-left: 5px solid #27ae60; transform: scale(1.02); }
    .number { font-weight: bold; color: #e74c3c; min-width: 35px; text-align: right; margin-right: 12px; font-size: 1.1em; }
    .text { flex: 1; word-break: break-all; }
    .status { font-size: 0.9em; color: #27ae60; font-weight: 600; min-width: 110px; text-align: right; opacity: 0; transition: opacity 0.3s; }
    .item.copied .status { opacity: 1; }
    .empty { text-align: center; color: #777; padding: 60px 0; font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <h1>ลิ้งค์ไก่Blood (Real-time)</h1>
  
  <div class="input-area">
    <input type="text" id="input" placeholder="วางลิงก์ หรือพิมพ์ข้อความ..." autocomplete="off"/>
    <button id="add">เพิ่ม</button>
  </div>

  <div class="list" id="list"></div>
</div>

<script>
// === ส่วน Supabase Realtime ===
const SUPABASE_URL    = 'https://aziakeclztpmxwkjgfho.supabase.co';     // เปลี่ยนเป็นของคุณ
const SUPABASE_ANON_KEY = 'sb_publishable_JSlqYd3qFGo5ZVkz4MUF9A_3RkKss-r';               // เปลี่ยนเป็น anon key ของคุณ

const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ชื่อห้อง (channel) — ใช้ชื่อเดียวกันทุกคนถึงจะเห็นกัน
const CHANNEL_NAME = 'blood-links-room';  

let items = JSON.parse(localStorage.getItem('quickCopyItems')) || [];

// สร้าง channel
const channel = supabase.channel(CHANNEL_NAME, {
  config: { broadcast: { self: true } }   // ให้ตัวเองก็เห็นข้อความที่ตัวเองส่งด้วย
});

// ฟังเมื่อมีคน broadcast ข้อความใหม่
channel
  .on('broadcast', { event: 'new-link' }, (payload) => {
    const newText = payload.payload.text;
    if (newText) {
      items.unshift({ text: newText, copied: false });
      save();
      render();
    }
  })
  .subscribe((status) => {
    if (status === 'SUBSCRIBED') {
      console.log('Realtime พร้อมแล้ว!');
    }
  });

// === ฟังก์ชันเดิม ๆ ของคุณ ===
const list = document.getElementById('list');
const input = document.getElementById('input');
const addBtn = document.getElementById('add');

function save() {
  localStorage.setItem('quickCopyItems', JSON.stringify(items));
}

function render() {
  list.innerHTML = '';
  if (items.length === 0) {
    list.innerHTML = '<div class="empty">ยังไม่มีข้อความ</div>';
    return;
  }

  items.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'item';
    if (item.copied) div.classList.add('copied');

    const number = document.createElement('span');
    number.className = 'number';
    number.textContent = (items.length - index) + '  ';

    const textSpan = document.createElement('span');
    textSpan.className = 'text';
    textSpan.textContent = item.text;

    const status = document.createElement('span');
    status.className = 'status';
    status.textContent = 'คัดลอกแล้ว!';

    div.appendChild(number);
    div.appendChild(textSpan);
    div.appendChild(status);

    div.addEventListener('click', (e) => {
      if (e.detail === 2) return;
      navigator.clipboard.writeText(item.text).then(() => {
        div.classList.add('copied');
        setTimeout(() => {
          items.splice(index, 1);
          save();
          render();
        }, 800);
      }).catch(err => {
        console.error('คัดลอกไม่ได้:', err);
        alert('คัดลอกไม่ได้ กรุณาลองใหม่');
      });
    });

    div.addEventListener('dblclick', () => {
      if (isProbablyUrl(item.text)) {
        window.open(item.text, '_blank', 'noopener,noreferrer');
      }
    });

    list.appendChild(div);
  });
}

function isProbablyUrl(str) {
  return /^(https?:\/\/|www\.)[^\s/\( .?#].[^\s]*$/i.test(str) ||
         (str.includes('.') && !str.includes(' ') && str.length > 8);
}

function addItem() {
  const val = input.value.trim();
  if (!val) return;

  // เพิ่มใน local ก่อน
  items.unshift({ text: val, copied: false });
  input.value = '';
  save();
  render();

  // ส่งไปให้คนอื่นเห็นด้วย (broadcast)
  channel.send({
    type: 'broadcast',
    event: 'new-link',
    payload: { text: val }
  });
}

addBtn.addEventListener('click', addItem);
input.addEventListener('keypress', e => {
  if (e.key === 'Enter') addItem();
});

// โหลดครั้งแรก
render();
</script>

</body>
</html>
